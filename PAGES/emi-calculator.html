<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BMW EMI Calculator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="../CSS/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a href="../index.html"
class="navbar-brand">

BMW Motorrad

</a>

</div>

</nav>

<section class="py-5">

<div class="container">

<h1 class="text-center mb-5">
BMW EMI Calculator
</h1>

<div class="row justify-content-center">

<div class="col-md-6">

<input
type="number"
id="price"
class="form-control mb-3"
placeholder="Bike Price">

<input
type="number"
id="years"
class="form-control mb-3"
placeholder="Loan Years">

<input
type="number"
id="interest"
class="form-control mb-3"
placeholder="Interest Rate (%)">

<button
class="btn btn-primary w-100"
onclick="calculateEMI()">

Calculate EMI

</button>

<div
id="emiResult"
class="mt-4">

</div>

</div>

</div>

</div>

</section>

<script src="../JS/emi.js"></script>

</body>

</html>
