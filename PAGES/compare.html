<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Compare BMW Bikes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/responsive.css">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand fw-bold" href="../index.html">
                BMW Motorrad
            </a>

            <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navMenu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navMenu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="bikes.html">Bikes</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="compare.html">Compare</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="test-ride.html">Test Ride</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- HEADER -->

    <section class="py-5 text-center">

        <div class="container">

            <h1 class="display-4 fw-bold">
                Compare BMW Bikes
            </h1>

            <p class="lead">
                Compare specifications and choose your perfect BMW motorcycle.
            </p>

        </div>

    </section>

    <!-- COMPARE SECTION -->

    <section class="pb-5">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-md-5 mb-3">

                    <select class="form-select" id="bike1">

                        <option value="g310gs">BMW G310GS</option>
                        <option value="s1000rr">BMW S1000RR</option>
                        <option value="m1000rr">BMW M1000RR</option>

                    </select>

                </div>

                <div class="col-md-5 mb-3">

                    <select class="form-select" id="bike2">

                        <option value="s1000rr">BMW S1000RR</option>
                        <option value="g310gs">BMW G310GS</option>
                        <option value="m1000rr">BMW M1000RR</option>

                    </select>

                </div>

                <div class="col-md-2 mb-3">

                    <button
                        class="btn btn-primary w-100"
                        onclick="compareBikes()">

                        Compare

                    </button>

                </div>

            </div>

            <div id="compareResult" class="mt-5">

            </div>

        </div>

    </section>

    <!-- FOOTER -->

    <footer class="bg-black text-center text-white py-4">

        <p class="mb-0">
            © 2026 BMW Motorrad World | Designed by Lucky
        </p>

    </footer>

    <!-- SCRIPT -->

    <script>

        function compareBikes() {

            const bikes = {

                g310gs: {
                    name: "BMW G310GS",
                    engine: "313cc",
                    power: "34 HP",
                    torque: "28 Nm",
                    topspeed: "143 km/h",
                    weight: "175 KG",
                    price: "₹3.30 Lakh"
                },

                s1000rr: {
                    name: "BMW S1000RR",
                    engine: "999cc",
                    power: "210 HP",
                    torque: "113 Nm",
                    topspeed: "299 km/h",
                    weight: "197 KG",
                    price: "₹20.75 Lakh"
                },

                m1000rr: {
                    name: "BMW M1000RR",
                    engine: "999cc",
                    power: "212 HP",
                    torque: "113 Nm",
                    topspeed: "314 km/h",
                    weight: "192 KG",
                    price: "₹49.00 Lakh"
                }

            };

            let bike1 = document.getElementById("bike1").value;
            let bike2 = document.getElementById("bike2").value;

            if (bike1 === bike2) {

                document.getElementById("compareResult").innerHTML =

                    `<div class="alert alert-warning text-center">
                        Please select two different bikes.
                    </div>`;

                return;
            }

            let b1 = bikes[bike1];
            let b2 = bikes[bike2];

            document.getElementById("compareResult").innerHTML = `

                <div class="row g-4">

                    <div class="col-md-6">

                        <div class="card bg-dark text-white h-100 p-4">

                            <h3>${b1.name}</h3>

                            <hr>

                            <p><strong>Engine:</strong> ${b1.engine}</p>
                            <p><strong>Power:</strong> ${b1.power}</p>
                            <p><strong>Torque:</strong> ${b1.torque}</p>
                            <p><strong>Top Speed:</strong> ${b1.topspeed}</p>
                            <p><strong>Weight:</strong> ${b1.weight}</p>
                            <p><strong>Price:</strong> ${b1.price}</p>

                        </div>

                    </div>

                    <div class="col-md-6">

                        <div class="card bg-dark text-white h-100 p-4">

                            <h3>${b2.name}</h3>

                            <hr>

                            <p><strong>Engine:</strong> ${b2.engine}</p>
                            <p><strong>Power:</strong> ${b2.power}</p>
                            <p><strong>Torque:</strong> ${b2.torque}</p>
                            <p><strong>Top Speed:</strong> ${b2.topspeed}</p>
                            <p><strong>Weight:</strong> ${b2.weight}</p>
                            <p><strong>Price:</strong> ${b2.price}</p>

                        </div>

                    </div>

                </div>

            `;
        }

        window.onload = compareBikes;

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
